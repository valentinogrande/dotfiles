# ─── Picom v10 ── Minimalista ────────────────────────────────────────────

# Backend
backend = "glx"
vsync = true
glx-no-stencil = true

# Shadows
shadow = true
shadow-radius = 12
shadow-offset-x = -5
shadow-offset-y = -5
shadow-opacity = 0.3
shadow-exclude = [
    "class_g = 'Polybar'",
    "_GTK_FRAME_EXTENTS@:c"
]

# Fading
fading = true
fade-in-step = 0.06
fade-out-step = 0.06
fade-delta = 5

# Opacity
inactive-opacity = 0.92
active-opacity = 1.0
frame-opacity = 1.0
inactive-opacity-override = false

opacity-rule = [
    "100:class_g = 'firefox'",
    "100:class_g = 'Google-chrome'",
    "100:class_g = 'Chromium'",
    "95:class_g = 'kitty' && focused",
    "85:class_g = 'kitty' && !focused",
    "100:class_g = 'Polybar'"
]

# Corners
corner-radius = 6
rounded-corners-exclude = [
    "class_g = 'Polybar'"
]

# Blur
blur-method = "gaussian"
blur-size = 10
blur-background-exclude = [
    "class_g = 'Polybar'",
    "window_type = 'dock'"
]

# Focus
focus-exclude = [
    "class_g = 'Rofi'"
]

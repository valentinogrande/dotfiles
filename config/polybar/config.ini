;; ─── Polybar ── Minimalista Oscuro ───────────────────────────────────────

[colors]
bg = #0a0a14
bg-alt = #141422
fg = #c0c0c0
fg-dim = #555555
accent = #666666
urgent = #cc4444
green = #55aa55
yellow = #ccaa44
blue = #5577aa

[bar/main]
monitor = ${env:MONITOR:}
width = 100%
height = 30pt

background = ${colors.bg}
foreground = ${colors.fg}

line-size = 2pt

padding-left = 2
padding-right = 2

module-margin = 1

; Nerd Font has all icons built in
font-0 = JetBrainsMono Nerd Font:size=10;3
font-1 = JetBrainsMono Nerd Font:size=13;4
font-2 = JetBrainsMono Nerd Font:size=11;3

modules-left = i3 player
modules-center = date
modules-right = pulseaudio backlight filesystem memory cpu temperature wifi battery powermenu

cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true
wm-restack = i3
override-redirect = false

separator = %{F#333333}│%{F-}

; ─── Workspaces ──────────────────────────────────────────────────────────

[module/i3]
type = internal/i3
pin-workspaces = true
show-urgent = true
strip-wsnumbers = true
index-sort = true

label-focused = %index%
label-focused-background = ${colors.bg-alt}
label-focused-foreground = ${colors.fg}
label-focused-underline = ${colors.accent}
label-focused-padding = 2

label-unfocused = %index%
label-unfocused-foreground = ${colors.fg-dim}
label-unfocused-padding = 2

label-urgent = %index%
label-urgent-foreground = ${colors.urgent}
label-urgent-underline = ${colors.urgent}
label-urgent-padding = 2

label-visible = %index%
label-visible-foreground = ${colors.fg-dim}
label-visible-padding = 2

; ─── Media Player ────────────────────────────────────────────────────────

[module/player]
type = custom/script
exec = playerctl metadata --format "{{artist}} - {{title}}" 2>/dev/null || echo ""
exec-if = playerctl status 2>/dev/null | grep -q Playing
interval = 3
format-prefix = "  "
format-prefix-foreground = ${colors.green}
label = %output:0:40:...%
label-foreground = ${colors.fg-dim}

; ─── Clock ───────────────────────────────────────────────────────────────

[module/date]
type = internal/date
interval = 30
date = %a %d %b
time = %H:%M

label = %{T2}%{T-}  %date%  %{T2}%{T-}  %time%
label-foreground = ${colors.fg}

; ─── Audio ───────────────────────────────────────────────────────────────

[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = true
interval = 5

format-volume = <ramp-volume> <bar-volume> <label-volume>
label-volume = %percentage%%

label-muted = 󰝟  MUTE
label-muted-foreground = ${colors.fg-dim}

ramp-volume-0 =
ramp-volume-1 =
ramp-volume-2 =
ramp-volume-foreground = ${colors.blue}

bar-volume-width = 8
bar-volume-foreground-0 = ${colors.green}
bar-volume-foreground-1 = ${colors.green}
bar-volume-foreground-2 = ${colors.green}
bar-volume-foreground-3 = ${colors.green}
bar-volume-foreground-4 = ${colors.yellow}
bar-volume-foreground-5 = ${colors.yellow}
bar-volume-foreground-6 = ${colors.urgent}
bar-volume-foreground-7 = ${colors.urgent}
bar-volume-gradient = true
bar-volume-indicator =
bar-volume-indicator-foreground = ${colors.fg}
bar-volume-fill = ━
bar-volume-empty = ━
bar-volume-empty-foreground = ${colors.fg-dim}

click-right = pavucontrol &

; ─── Brightness ──────────────────────────────────────────────────────────

[module/backlight]
type = internal/backlight
card = amdgpu_bl1
enable-scroll = true

format = <ramp> <label>
label = %percentage%%

ramp-0 = 󰃞
ramp-1 = 󰃟
ramp-2 = 󰃠
ramp-foreground = ${colors.yellow}

; ─── Filesystem ──────────────────────────────────────────────────────────

[module/filesystem]
type = internal/fs
mount-0 = /
interval = 30
fixed-values = true

format-mounted-prefix = "󰋊 "
format-mounted-prefix-foreground = ${colors.fg-dim}
label-mounted = %percentage_used%%

label-unmounted = %mountpoint% N/A
label-unmounted-foreground = ${colors.fg-dim}

; ─── Memory ──────────────────────────────────────────────────────────────

[module/memory]
type = internal/memory
interval = 3

format-prefix = "󰍛 "
format-prefix-foreground = ${colors.blue}
label = %percentage_used%%

; ─── CPU ─────────────────────────────────────────────────────────────────

[module/cpu]
type = internal/cpu
interval = 3

format-prefix = " "
format-prefix-foreground = ${colors.green}
label = %percentage%%

; ─── Temperature ─────────────────────────────────────────────────────────

[module/temperature]
type = internal/temperature
interval = 5
thermal-zone = 0
warn-temperature = 75

format-prefix = " "
format-prefix-foreground = ${colors.yellow}
label = %temperature-c%

format-warn-prefix = " "
format-warn-prefix-foreground = ${colors.urgent}
label-warn = %temperature-c%
label-warn-foreground = ${colors.urgent}

; ─── Network ─────────────────────────────────────────────────────────────

[module/network]
type = internal/network
interface-type = wired
interval = 5

format-connected-prefix = "󰈀 "
format-connected-prefix-foreground = ${colors.green}
label-connected = %local_ip%

label-disconnected = 󰈂  offline
label-disconnected-foreground = ${colors.fg-dim}

[module/wifi]
type = internal/network
interface-type = wireless
interval = 5

format-connected = <ramp-signal> <label-connected>
label-connected = %essid%

ramp-signal-0 = 󰤯
ramp-signal-1 = 󰤟
ramp-signal-2 = 󰤢
ramp-signal-3 = 󰤥
ramp-signal-4 = 󰤨
ramp-signal-foreground = ${colors.green}

label-disconnected = 󰤭  off
label-disconnected-foreground = ${colors.fg-dim}

; ─── Battery (for laptops) ───────────────────────────────────────────────

[module/battery]
type = internal/battery
battery = BAT0
adapter = ACAD
full-at = 98
low-at = 15

format-charging = <animation-charging> <label-charging>
label-charging = %percentage%%

format-discharging = <ramp-capacity> <label-discharging>
label-discharging = %percentage%%

format-full-prefix = "󰁹 "
format-full-prefix-foreground = ${colors.green}
label-full = %percentage%%

format-low = <ramp-capacity> <label-low>
label-low = %percentage%%
label-low-foreground = ${colors.urgent}

ramp-capacity-0 = 󰁺
ramp-capacity-1 = 󰁻
ramp-capacity-2 = 󰁼
ramp-capacity-3 = 󰁽
ramp-capacity-4 = 󰁾
ramp-capacity-5 = 󰁿
ramp-capacity-6 = 󰂀
ramp-capacity-7 = 󰂁
ramp-capacity-8 = 󰂂
ramp-capacity-9 = 󰁹
ramp-capacity-foreground = ${colors.yellow}

animation-charging-0 = 󰢜
animation-charging-1 = 󰂆
animation-charging-2 = 󰂇
animation-charging-3 = 󰂈
animation-charging-4 = 󰢝
animation-charging-foreground = ${colors.green}
animation-charging-framerate = 750

; ─── Power Menu ──────────────────────────────────────────────────────────

[module/powermenu]
type = custom/text
label = "⏻"
label-foreground = ${colors.urgent}
label-padding = 1
click-left = ~/.config/rofi/powermenu.sh

; ─── Settings ────────────────────────────────────────────────────────────

[settings]
screenchange-reload = true
pseudo-transparency = true

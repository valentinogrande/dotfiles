# ─── Kitty ── Minimalista Oscuro ──────────────────────────────────────────

# Font
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 13.0

# Cursor
cursor_shape block
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0
cursor #c0c0c0
cursor_text_color #0a0a14

# Scrollback
scrollback_lines 10000

# Mouse
mouse_hide_wait 3.0
url_color #5577aa
url_style curly

# Performance
repaint_delay 10
input_delay 3
sync_to_monitor yes

# Window Layout
remember_window_size  yes
initial_window_width  1200
initial_window_height 800
window_padding_width 8
window_padding_height 6

# Tab Bar
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template "{index}: {title}"
active_tab_foreground   #c0c0c0
active_tab_background   #141422
inactive_tab_foreground #555555
inactive_tab_background #0a0a14
tab_bar_background      #070710

# ─── Color Scheme ── Minimalista Oscuro ───────────────────────────────────
foreground #c0c0c0
background #0a0a14
selection_foreground #0a0a14
selection_background #c0c0c0

# Black
color0 #0a0a14
color8 #555555

# Red
color1 #cc4444
color9 #dd5555

# Green
color2  #55aa55
color10 #66bb66

# Yellow
color3  #ccaa44
color11 #ddbb55

# Blue
color4  #5577aa
color12 #6688bb

# Magenta
color5  #886699
color13 #9977aa

# Cyan
color6  #55aa99
color14 #66bbaa

# White
color7  #c0c0c0
color15 #e0e0e0

# Transparency
enable_audio_bell no
visual_bell_duration 0

background_opacity 0.85

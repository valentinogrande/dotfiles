# ─── hyprlock ── Tokyo Night ─────────────────────────────────────────────
background {
    monitor =
    path = ~/Pictures/wallpapers/aurora-iceland.jpg
    blur_passes = 3
    blur_size = 8
    color = rgb(1a1b26)
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    outer_color = rgb(7aa2f7)
    inner_color = rgb(24283b)
    font_color = rgb(c0caf5)
    fade_on_empty = true
    placeholder_text = <i>password...</i>
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgb(c0caf5)
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    position = 0, 120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    color = rgb(565f89)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, 60
    halign = center
    valign = center
}

# ─── Hyprland ── Minimalista Oscuro / Tokyo Night ────────────────────────
# Puerto del setup i3. Wayland-native.

# ─── Monitors ────────────────────────────────────────────────────────────
# Nombres Wayland difieren de xrandr (DisplayPort-0 -> DP-1, HDMI-A-0 -> HDMI-A-1).
# Verificar reales con:  hyprctl monitors
$left  = DP-1
$right = HDMI-A-1

monitor = $left,  preferred, 0x0,    1
monitor = $right, preferred, auto,   1
# Fallback para cualquier otro monitor conectado
monitor = , preferred, auto, 1

# ─── Variables ───────────────────────────────────────────────────────────
$mod      = SUPER
$terminal = kitty
$launcher = rofi -show drun -show-icons -theme ~/.config/rofi/dark.rasi
$filemgr  = thunar

# ─── Autostart ───────────────────────────────────────────────────────────
exec-once = dex --autostart --environment hyprland
exec-once = nm-applet --indicator
exec-once = blueman-applet
exec-once = dunst
exec-once = hyprpaper
exec-once = hypridle
exec-once = waybar
# Portales para screenshare / file pickers
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# ─── Environment ─────────────────────────────────────────────────────────
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland
env = MOZ_ENABLE_WAYLAND,1

# ─── General / Gaps / Border ─────────────────────────────────────────────
general {
    gaps_in = 8
    gaps_out = 2
    border_size = 2
    col.active_border = rgb(7aa2f7)
    col.inactive_border = rgb(222222)
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 6
    blur {
        enabled = true
        size = 6
        passes = 2
    }
    shadow {
        enabled = true
        range = 12
        render_power = 3
        color = rgba(00000055)
    }
    active_opacity = 1.0
    inactive_opacity = 0.95
}

animations {
    enabled = true
    bezier = ease, 0.25, 0.1, 0.25, 1.0
    animation = windows,     1, 4, ease, slide
    animation = windowsOut,  1, 4, ease, slide
    animation = fade,        1, 4, ease
    animation = workspaces,  1, 5, ease, slide
    animation = border,      1, 6, ease
}

dwindle {
    pseudotile = true
    preserve_split = true
}

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
        tap-to-click = true
    }
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    focus_on_activate = true
}

# ─── Keybindings ─────────────────────────────────────────────────────────
# Terminal / launcher / apps
bind = $mod, Return, exec, $terminal
bind = $mod SHIFT, Q, killactive,
bind = $mod, D, exec, $launcher
bind = $mod, N, exec, $filemgr
bind = $mod SHIFT, M, exec, $terminal -e btop
bind = $mod SHIFT, X, exec, hyprlock

# Floating / fullscreen
bind = $mod SHIFT, SPACE, togglefloating,
bind = $mod, F, fullscreen, 0
bind = $mod, P, pseudo,
bind = $mod, J, togglesplit,

# ─── Navigation (j=left k=down l=up ;=right, como i3) ─────────────────────
bind = $mod, J, movefocus, l
bind = $mod, K, movefocus, d
bind = $mod, L, movefocus, u
bind = $mod, semicolon, movefocus, r
bind = $mod, Left,  movefocus, l
bind = $mod, Down,  movefocus, d
bind = $mod, Up,    movefocus, u
bind = $mod, Right, movefocus, r

bind = $mod SHIFT, J, movewindow, l
bind = $mod SHIFT, K, movewindow, d
bind = $mod SHIFT, L, movewindow, u
bind = $mod SHIFT, semicolon, movewindow, r
bind = $mod SHIFT, Left,  movewindow, l
bind = $mod SHIFT, Down,  movewindow, d
bind = $mod SHIFT, Up,    movewindow, u
bind = $mod SHIFT, Right, movewindow, r

# ─── Resize submap ───────────────────────────────────────────────────────
bind = $mod, R, submap, resize
submap = resize
binde = , J, resizeactive, -20 0
binde = , semicolon, resizeactive, 20 0
binde = , K, resizeactive, 0 20
binde = , L, resizeactive, 0 -20
binde = , Left,  resizeactive, -20 0
binde = , Right, resizeactive, 20 0
binde = , Down,  resizeactive, 0 20
binde = , Up,    resizeactive, 0 -20
bind = , Return, submap, reset
bind = , Escape, submap, reset
bind = $mod, R, submap, reset
submap = reset

# ─── Workspaces ──────────────────────────────────────────────────────────
# ws 1-10 -> monitor izquierdo, ws 11-20 -> monitor derecho
workspace = 1,  monitor:$left
workspace = 2,  monitor:$left
workspace = 3,  monitor:$left
workspace = 4,  monitor:$left
workspace = 5,  monitor:$left
workspace = 6,  monitor:$left
workspace = 7,  monitor:$left
workspace = 8,  monitor:$left
workspace = 9,  monitor:$left
workspace = 10, monitor:$left
workspace = 11, monitor:$right
workspace = 12, monitor:$right
workspace = 13, monitor:$right
workspace = 14, monitor:$right
workspace = 15, monitor:$right
workspace = 16, monitor:$right
workspace = 17, monitor:$right
workspace = 18, monitor:$right
workspace = 19, monitor:$right
workspace = 20, monitor:$right

# Switch: $mod+1-0 izquierdo, $mod+Ctrl+1-0 derecho
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10
bind = $mod CTRL, 1, workspace, 11
bind = $mod CTRL, 2, workspace, 12
bind = $mod CTRL, 3, workspace, 13
bind = $mod CTRL, 4, workspace, 14
bind = $mod CTRL, 5, workspace, 15
bind = $mod CTRL, 6, workspace, 16
bind = $mod CTRL, 7, workspace, 17
bind = $mod CTRL, 8, workspace, 18
bind = $mod CTRL, 9, workspace, 19
bind = $mod CTRL, 0, workspace, 20

# Mover ventana: $mod+Shift izquierdo, $mod+Ctrl+Shift derecho
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10
bind = $mod CTRL SHIFT, 1, movetoworkspace, 11
bind = $mod CTRL SHIFT, 2, movetoworkspace, 12
bind = $mod CTRL SHIFT, 3, movetoworkspace, 13
bind = $mod CTRL SHIFT, 4, movetoworkspace, 14
bind = $mod CTRL SHIFT, 5, movetoworkspace, 15
bind = $mod CTRL SHIFT, 6, movetoworkspace, 16
bind = $mod CTRL SHIFT, 7, movetoworkspace, 17
bind = $mod CTRL SHIFT, 8, movetoworkspace, 18
bind = $mod CTRL SHIFT, 9, movetoworkspace, 19
bind = $mod CTRL SHIFT, 0, movetoworkspace, 20

# ─── Scratchpad (special workspace) ──────────────────────────────────────
bind = $mod, minus, movetoworkspace, special
bind = $mod, plus,  togglespecialworkspace,

# ─── Mouse ───────────────────────────────────────────────────────────────
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ─── Media / brightness / audio (funcionan en Wayland) ───────────────────
bindel = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bindel = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bindl  = , XF86AudioMute,        exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bindl  = , XF86AudioMicMute,     exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set +5%
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindl  = , XF86AudioPlay, exec, playerctl play-pause
bindl  = , XF86AudioNext, exec, playerctl next
bindl  = , XF86AudioPrev, exec, playerctl previous
bindl  = , XF86AudioStop, exec, playerctl stop

# ─── Screenshots (grim + slurp + wl-clipboard) ───────────────────────────
bind = , Print,       exec, grim ~/Pictures/screenshot-$(date +%s).png
bind = $mod, Print,   exec, grim -g "$(slurp)" ~/Pictures/screenshot-$(date +%s).png
bind = SHIFT, Print,  exec, grim -g "$(slurp)" - | wl-copy -t image/png

# ─── Notifications (dunst) ───────────────────────────────────────────────
bind = $mod, BackSpace,       exec, dunstctl close
bind = $mod SHIFT, BackSpace, exec, dunstctl close-all
bind = $mod, grave,           exec, dunstctl history-pop

# ─── System ──────────────────────────────────────────────────────────────
bind = $mod SHIFT, C, exec, hyprctl reload
bind = $mod SHIFT, E, exit,

# ─── Window rules ────────────────────────────────────────────────────────
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, class:^(file-roller)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, class:^(galculator)$
windowrulev2 = float, class:^(gpick)$
windowrulev2 = float, title:^(btop)$
windowrulev2 = size 1000 600, title:^(btop)$
windowrulev2 = float, title:^(Open File)(.*)$
